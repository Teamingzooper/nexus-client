name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Build main + renderer bundles
        run: npm run build

      - name: Build & publish (macOS — arm64 + x64)
        if: matrix.os == 'macos-latest'
        # Single invocation so electron-builder's internal retry loop can
        # absorb the hdiutil resize race that fires when two DMGs are
        # created in parallel. Config in package.json already declares
        # arch: [x64, arm64] on both DMG and ZIP targets.
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned build — set CSC_LINK / CSC_KEY_PASSWORD to sign.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build & publish (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexus-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: ignore
