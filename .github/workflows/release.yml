name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and upload to (e.g. v1.2.0)"
        required: true
        type: string
      platforms:
        description: "Which platforms to (re)build and upload"
        required: true
        default: all
        type: choice
        options:
          - all
          - mac
          - win
          - linux

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # DO_MAC / DO_WIN / DO_LINUX gate the platform-specific steps (installer
    # build, updater manifest, upload). matrix.os isn't available in
    # job-level if conditions, so we can't skip the whole job — the early
    # steps (checkout, npm ci, typecheck, unit tests, bundle build) run on
    # every runner regardless, but no installers are produced or uploaded
    # for a deselected platform.
    env:
      DO_MAC: ${{ github.event_name != 'workflow_dispatch' || inputs.platforms == 'all' || inputs.platforms == 'mac' }}
      DO_WIN: ${{ github.event_name != 'workflow_dispatch' || inputs.platforms == 'all' || inputs.platforms == 'win' }}
      DO_LINUX: ${{ github.event_name != 'workflow_dispatch' || inputs.platforms == 'all' || inputs.platforms == 'linux' }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Build main + renderer bundles
        run: npm run build

      # --publish never: electron-builder produces the artifacts on the
      # runner but does NOT push to GitHub and does NOT generate
      # latest.yml / latest-mac.yml (those only exist when publish is
      # configured). The upload step below grabs only user-facing installers.
      - name: Build installers (macOS — arm64 + x64)
        if: matrix.os == 'macos-latest' && env.DO_MAC == 'true'
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build installer (Windows)
        if: matrix.os == 'windows-latest' && env.DO_WIN == 'true'
        run: npx electron-builder --win --publish never

      - name: Build installer (Linux — AppImage)
        if: matrix.os == 'ubuntu-latest' && env.DO_LINUX == 'true'
        run: npx electron-builder --linux --publish never

      # Upload only DMG (mac), EXE (win), and AppImage (linux). The
      # .blockmap files have a different suffix (*.dmg.blockmap,
      # *.exe.blockmap) and are not matched by these globs, so they stay
      # on the runner. Mac ZIPs are built by electron-builder but
      # intentionally not uploaded. Source code tarballs are auto-attached
      # by GitHub Releases.
      - name: Generate updater manifest (macOS)
        if: matrix.os == 'macos-latest' && env.DO_MAC == 'true'
        run: node scripts/build-updater-yml.js mac
      - name: Generate updater manifest (Windows)
        if: matrix.os == 'windows-latest' && env.DO_WIN == 'true'
        run: node scripts/build-updater-yml.js win
      - name: Generate updater manifest (Linux)
        if: matrix.os == 'ubuntu-latest' && env.DO_LINUX == 'true'
        run: node scripts/build-updater-yml.js linux

      - name: Extract changelog for this version
        id: changelog
        # Force bash on all runners — Windows defaults to PowerShell, which
        # chokes on BODY=$(...) and heredoc syntax.
        shell: bash
        run: |
          BODY=$(node scripts/extract-changelog.js "${{ inputs.tag || github.ref_name }}")
          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Upload release assets (macOS)
        if: matrix.os == 'macos-latest' && env.DO_MAC == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            release/*.dmg

      - name: Upload release assets (Windows)
        if: matrix.os == 'windows-latest' && env.DO_WIN == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            release/*.exe

      - name: Upload release assets (Linux)
        if: matrix.os == 'ubuntu-latest' && env.DO_LINUX == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            release/*.AppImage
